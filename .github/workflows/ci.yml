name: Build and Push to Docker Hub

on:
  push:
    branches: [main]  # Only trigger on main branch pushes
  workflow_dispatch:  # Allows you to manually trigger the build from GitHub or CMD

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          # These must match your GitHub Secrets exactly
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dockerfile
          push: true
          # format: username/repository:tag
          tags: imh1005822/customer-churn-prediction:latest